services:
  farjan:
    build: .
    container_name: farjan
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./data:/data
    environment:
      - TZ=${TZ:-Europe/Helsinki}
      - DATA_DIR=/data
      # Set ANALYTICS_TOKEN to enable the analytics dashboard at /analytics
      # e.g. ANALYTICS_TOKEN=change-me-to-a-strong-secret
      # - ANALYTICS_TOKEN=${ANALYTICS_TOKEN}
      # Set LOG_ANALYTICS=false to disable event recording entirely
      # - LOG_ANALYTICS=false
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
